<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    section{
        border: dotted 3px pink;
        display: grid;
       gap: 1rem;
       grid-template-columns: 200px, 200px, 200px
    }
    .div-1{
        border: 2px solid red;
        width: 6rem;
        height: 6rem;
    }
    .div-2{
        border: 2px solid blue;
        width: 6rem;
        height: 6rem;
    }
    .div-3{
        border: 2px solid green;
        width: 6rem;
        height: 6rem;
    }
</style>
<body>
    <section>
        <div class="div-1"></div>
        <div class="div-2"></div>
        <div class="div-3"></div>
    </section>
</body>
</html>
